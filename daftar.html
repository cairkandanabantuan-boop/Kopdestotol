<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DAFTAR - KOPDESTOTO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff}
.header{background:linear-gradient(to bottom,#8B0000,#000);padding:12px 10px;display:flex;align-items:center;gap:10px}
.header a{color:#FFD700;text-decoration:none;font-size:20px}
.header h1{font-size:16px}
.container{max-width:400px;margin:30px auto;padding:20px}
.box{background:#1a1a1a;padding:25px;border-radius:12px;border:1px solid #FF0000}
.box h2{text-align:center;color:#FFD700;margin-bottom:20px}
label{display:block;margin-top:12px;font-size:13px;color:#FFD700}
input,select{width:100%;padding:12px;margin-top:5px;border-radius:8px;border:1px solid #333;background:#0d0d0d;color:#fff}
.btn{width:100%;padding:14px;margin-top:20px;background:linear-gradient(90deg,#FF0000,#8B0000);border:none;border-radius:8px;color:#fff;font-weight:bold;font-size:16px;cursor:pointer}
.btn:hover{opacity:0.8}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,#8B0000,#5a0000);display:flex;justify-content:space-around;padding:8px 0;border-top:2px solid #FF0000}
.nav-item{text-align:center;color:#ccc;font-size:10px;text-decoration:none;flex:1}
.nav-item img{width:26px;display:block;margin:0 auto 3px;filter:brightness(0.7)}
.nav-item.active{color:#FFD700}
body{padding-bottom:80px}
</style>
</head>
<body>

<div class="header">
  <a href="index.html">←</a>
  <h1>DAFTAR AKUN BARU</h1>
</div>

<div class="container">
  <div class="box">
    <h2>🔥 DAFTAR GRATIS 🔥</h2>
    <form action="https://wa.me/628xxxxxxxxxx" method="get" target="_blank">
      <label>Username</label>
      <input type="text" name="username" placeholder="Buat Username" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="Min. 6 Karakter" required>
      <label>No HP / WhatsApp</label>
      <input type="tel" name="whatsapp" placeholder="08xxxxxxxxxx" required>
      <label>Nama Rekening</label>
      <input type="text" name="nama_rekening" placeholder="Sesuai Nama Bank" required>
      <label>Bank / E-Wallet</label>
      <select name="bank" required>
        <option value="">-- Pilih Bank --</option>
        <option>BCA</option><option>BRI</option><option>MANDIRI</option>
        <option>BNI</option><option>DANA</option><option>OVO</option>
      </select>
      <label>No Rekening</label>
      <input type="text" name="no_rekening" placeholder="Nomor Rekening" required>
      <button class="btn" type="submit">DAFTAR SEKARANG</button>
    </form>
    <p style="text-align:center;margin-top:15px;font-size:12px">Sudah punya akun? <a href="login1.html" style="color:#FFD700">Login Disini</a></p>
  </div>
</div>

</div>

</body>
</html>
